<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Text to Speech | ArabTools</title>
<meta name="description" content="نص إلى كلام - Text to Speech | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#8b5cf622;color:#8b5cf6"><i class="fas fa-microphone"></i></div>
<div class="tool-page-info"><h1><span data-ar="نص إلى كلام" data-en="Text to Speech">نص إلى كلام</span></h1><p><span data-ar="حول النص إلى صوت" data-en="Convert text to voice">حول النص إلى صوت</span></p></div>
</div>
<div class="tool-workspace">
<div class="form-group"><label class="form-label" data-ar="اكتب النص هنا:" data-en="Enter text here:">اكتب النص هنا:</label>
<textarea class="form-control tts-text" id="tts-text" placeholder="اكتب النصّ الذي تريد تحويله إلى كلام..."></textarea></div>
<div class="row">
<div class="col form-group"><label class="form-label" data-ar="الصوت:" data-en="Voice:">الصوت:</label><select class="form-control" id="tts-voice"></select></div>
<div class="col form-group"><label class="form-label" data-ar="السرعة:" data-en="Speed:">السرعة:</label><div class="range-wrap"><input type="range" class="form-control" id="tts-rate" min="0.5" max="2" step="0.1" value="1" oninput="document.getElementById('rv').textContent=this.value+'x'"><span id="rv">1x</span></div></div>
<div class="col form-group"><label class="form-label" data-ar="النبرة:" data-en="Pitch:">النبرة:</label><div class="range-wrap"><input type="range" class="form-control" id="tts-pitch" min="0" max="2" step="0.1" value="1" oninput="document.getElementById('pv').textContent=this.value"><span id="pv">1</span></div></div>
</div>
<div style="display:flex;gap:12px;flex-wrap:wrap">
<button class="btn btn-primary btn-lg" onclick="speak()"><i class="fas fa-play"></i> <span data-ar="استمع" data-en="Listen">استمع</span></button>
<button class="btn btn-secondary" onclick="speechSynthesis.paused?speechSynthesis.resume():speechSynthesis.pause()"><i class="fas fa-pause"></i> <span data-ar="توقف" data-en="Pause">توقف</span></button>
<button class="btn btn-secondary" onclick="speechSynthesis.cancel()"><i class="fas fa-stop"></i> <span data-ar="إيقاف" data-en="Stop">إيقاف</span></button>
</div>
<script>
const sel=document.getElementById('tts-voice');function loadV(){const v=speechSynthesis.getVoices();sel.innerHTML=v.map((v,i)=>`<option value="${i}">${v.name} (${v.lang})</option>`).join('');}loadV();speechSynthesis.onvoiceschanged=loadV;
function speak(){const text=document.getElementById('tts-text').value;if(!text){toast(lang==='ar'?'الرجاء إدخال نص':'Please enter text','error');return;}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);const v=speechSynthesis.getVoices();const i=parseInt(sel.value||0);if(v[i])u.voice=v[i];u.rate=parseFloat(document.getElementById('tts-rate').value);u.pitch=parseFloat(document.getElementById('tts-pitch').value);speechSynthesis.speak(u);toast(lang==='ar'?'جاري القراءة...':'Speaking...','info');}
</script></div>
<div class="adsense-banner" style="height:250px;margin:32px 0"><div class="adsense-inner" style="flex-direction:column"><i class="fas fa-rectangle-ad" style="font-size:28px;opacity:0.2"></i><span style="margin-top:8px" data-ar="إعلان" data-en="Ad Space">إعلان</span></div></div>
</div>
<footer><div class="footer-inner">

<p class="footer-copy" id="footer-copy">© 2025 عرب تولز — جميع الحقوق محفوظة</p>
</div></footer>
<script src="../js/shared.js"></script>
</body></html>
