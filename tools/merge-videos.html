<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Merge Videos | ArabTools</title>
<meta name="description" content="دمج فيديوهات - Merge Videos | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#8b5cf622;color:#8b5cf6"><i class="fas fa-object-group"></i></div>
<div class="tool-page-info"><h1><span data-ar="دمج فيديوهات" data-en="Merge Videos">دمج فيديوهات</span></h1><p><span data-ar="ادمج عدة فيديوهات" data-en="Merge multiple videos">ادمج عدة فيديوهات</span></p></div>
</div>
<div class="tool-workspace">
<div id="files-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"></div>
<button class="btn btn-secondary" onclick="document.getElementById('fi').click()"><i class="fas fa-plus"></i> <span data-ar="إضافة فيديو" data-en="Add Video">إضافة فيديو</span></button>
<input type="file" id="fi" accept=".mp4,.webm,.mov" style="display:none" onchange="addVid(this)">
<div id="merge-wrap" style="display:none;margin-top:20px"><button class="btn btn-primary btn-lg" onclick="doMerge()"><i class="fas fa-object-group"></i> <span data-ar="دمج" data-en="Merge">دمج</span></button></div>
<div id="result" style="display:none" class="result-box"><h3 data-ar="تم الدمج!" data-en="Merged!">تم الدمج!</h3><video id="out" controls style="width:100%;margin:12px 0;border-radius:8px"></video><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'merged.webm')"><i class="fas fa-download"></i></button></div>
<script>
let vids=[];
function addVid(input){const f=input.files[0];if(!f)return;vids.push(f);const list=document.getElementById('files-list');const item=document.createElement('div');item.style.cssText='display:flex;align-items:center;gap:10px;background:var(--surface2);padding:10px 14px;border-radius:8px;border:1px solid var(--border)';item.innerHTML='<i class="fas fa-film" style="color:var(--cat-video)"></i><span style="flex:1;font-size:14px">'+f.name+'</span>';list.appendChild(item);if(vids.length>=2)document.getElementById('merge-wrap').style.display='block';input.value='';}
async function doMerge(){if(vids.length<2){toast(lang==='ar'?'أضف فيديوهين على الأقل':'Add at least 2 videos','error');return;}toast(lang==='ar'?'جاري الدمج...':'Merging...','info');try{const first=document.createElement('video');first.src=URL.createObjectURL(vids[0]);first.muted=true;await new Promise(r=>{first.onloadedmetadata=r;});const canvas=document.createElement('canvas');canvas.width=first.videoWidth;canvas.height=first.videoHeight;const ctx=canvas.getContext('2d');const stream=canvas.captureStream(30);const chunks=[];const rec=new MediaRecorder(stream,{mimeType:'video/webm'});rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};let resolve;const p=new Promise(r=>{resolve=r;});rec.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم!':'Done!','success');resolve();};rec.start();async function playVid(i){if(i>=vids.length){rec.stop();return;}const v=document.createElement('video');v.src=URL.createObjectURL(vids[i]);v.muted=true;await new Promise(r=>{v.onloadedmetadata=r;});v.play();function draw(){if(v.ended){playVid(i+1);return;}ctx.drawImage(v,0,0,canvas.width,canvas.height);requestAnimationFrame(draw);}draw();}await playVid(0);await p;}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
</div>
<footer><div class="footer-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>

</div></footer>

</body></html>
