<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Split PDF | ArabTools</title>
<meta name="description" content="تقسيم PDF - Split PDF | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#ef444422;color:#ef4444"><i class="fas fa-file-alt"></i></div>
<div class="tool-page-info"><h1><span data-ar="تقسيم PDF" data-en="Split PDF">تقسيم PDF</span></h1><p><span data-ar="قسّم الـ PDF" data-en="Split PDF pages">قسّم الـ PDF</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz-ps"><input type="file" id="fi-ps" accept=".pdf"><i class="fas fa-cloud-upload-alt"></i><h3>ارفع ملف PDF</h3><p>.pdf</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-ps').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="ctrl" style="display:none;margin-top:24px">
<p id="info" style="color:var(--text-muted);font-size:14px;margin-bottom:16px"></p>
<div class="form-group"><label class="form-label" data-ar="الصفحات (مثال: 1-3,5,7):" data-en="Pages (e.g., 1-3,5,7):">الصفحات:</label><input type="text" class="form-control" id="range" placeholder="1-3,5,7"></div>
<button class="btn btn-primary btn-lg" onclick="doSplit()"><i class="fas fa-scissors"></i> <span data-ar="تقسيم وتنزيل" data-en="Split & Download">تقسيم وتنزيل</span></button>
</div>
<script>
let file=null,pageCount=0;
setupDropZone(document.getElementById('uz-ps'),document.getElementById('fi-ps'),async f=>{file=f;const ab=await f.arrayBuffer();const pdf=await PDFLib.PDFDocument.load(ab);pageCount=pdf.getPageCount();document.getElementById('info').textContent=(lang==='ar'?'عدد الصفحات: ':'Pages: ')+pageCount;document.getElementById('range').value='1-'+pageCount;document.getElementById('ctrl').style.display='block';});
async function doSplit(){if(!file)return;const range=document.getElementById('range').value;const pages=parsePageRange(range,pageCount);if(!pages.length){toast(lang==='ar'?'نطاق غير صالح':'Invalid range','error');return;}try{const ab=await file.arrayBuffer();const src=await PDFLib.PDFDocument.load(ab);const newPdf=await PDFLib.PDFDocument.create();const copied=await newPdf.copyPages(src,pages.map(p=>p-1));copied.forEach(p=>newPdf.addPage(p));const bytes=await newPdf.save();download(new Blob([bytes],{type:'application/pdf'}),'split.pdf');toast(lang==='ar'?'تم!':'Done!','success');}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
</div>
<footer><div class="footer-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<p class="footer-copy" id="footer-copy">© 2025 عرب تولز — جميع الحقوق محفوظة</p>
</div></footer>
<script src="../js/shared.js"></script>
</body></html>
