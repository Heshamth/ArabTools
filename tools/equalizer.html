<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Equalizer | ArabTools</title>
<meta name="description" content="المعادل الصوتي - Equalizer | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#0ea5e922;color:#0ea5e9"><i class="fas fa-sliders-h"></i></div>
<div class="tool-page-info"><h1><span data-ar="المعادل الصوتي" data-en="Equalizer">المعادل الصوتي</span></h1><p><span data-ar="ضبط ترددات الصوت" data-en="Audio frequency equalizer">ضبط ترددات الصوت</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz"><input type="file" id="fi" accept=".mp3,.wav,.ogg,.webm"><i class="fas fa-cloud-upload-alt"></i>
<h3 data-ar="ارفع الملف الصوتي" data-en="Upload Audio">ارفع الملف الصوتي</h3><p>MP3, WAV, OGG</p>
<button class="btn btn-primary btn-sm" onclick="document.getElementById('fi').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="controls" style="display:none;margin-top:24px">
<div class="media-preview"><audio id="preview" controls style="width:100%;padding:12px"></audio></div>
<div style="margin-top:20px">
<label class="form-label" data-ar="المعادل الصوتي:" data-en="Equalizer:">المعادل الصوتي:</label>
<div style="display:flex;gap:12px;padding:20px;background:var(--surface2);border-radius:var(--radius);border:1px solid var(--border);align-items:flex-end;justify-content:center">
<div class="eq-band"><input type="range" class="eq-slider" id="eq-60" min="-12" max="12" step="1" value="0" oninput="document.getElementById('eq-60-v').textContent=this.value"><span id="eq-60-v" style="font-size:11px;color:var(--accent)">0</span><label>60Hz</label></div><div class="eq-band"><input type="range" class="eq-slider" id="eq-250" min="-12" max="12" step="1" value="0" oninput="document.getElementById('eq-250-v').textContent=this.value"><span id="eq-250-v" style="font-size:11px;color:var(--accent)">0</span><label>250Hz</label></div><div class="eq-band"><input type="range" class="eq-slider" id="eq-1k" min="-12" max="12" step="1" value="0" oninput="document.getElementById('eq-1k-v').textContent=this.value"><span id="eq-1k-v" style="font-size:11px;color:var(--accent)">0</span><label>1kHz</label></div><div class="eq-band"><input type="range" class="eq-slider" id="eq-4k" min="-12" max="12" step="1" value="0" oninput="document.getElementById('eq-4k-v').textContent=this.value"><span id="eq-4k-v" style="font-size:11px;color:var(--accent)">0</span><label>4kHz</label></div><div class="eq-band"><input type="range" class="eq-slider" id="eq-8k" min="-12" max="12" step="1" value="0" oninput="document.getElementById('eq-8k-v').textContent=this.value"><span id="eq-8k-v" style="font-size:11px;color:var(--accent)">0</span><label>8kHz</label></div><div class="eq-band"><input type="range" class="eq-slider" id="eq-16k" min="-12" max="12" step="1" value="0" oninput="document.getElementById('eq-16k-v').textContent=this.value"><span id="eq-16k-v" style="font-size:11px;color:var(--accent)">0</span><label>16kHz</label></div>
</div>
<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap">
<button class="btn btn-secondary btn-sm" onclick="eqPreset('flat')"><span data-ar="مسطح" data-en="Flat">مسطح</span></button>
<button class="btn btn-secondary btn-sm" onclick="eqPreset('bass')"><span data-ar="باس" data-en="Bass Boost">باس</span></button>
<button class="btn btn-secondary btn-sm" onclick="eqPreset('vocal')"><span data-ar="صوت" data-en="Vocal">صوت</span></button>
<button class="btn btn-secondary btn-sm" onclick="eqPreset('treble')"><span data-ar="تريبل" data-en="Treble">تريبل</span></button>
</div>
</div>
<button class="btn btn-primary" style="margin-top:16px" onclick="applyEq()"><i class="fas fa-check"></i> <span data-ar="تطبيق وحفظ" data-en="Apply & Save">تطبيق وحفظ</span></button>
<div id="result" style="display:none;margin-top:20px" class="result-box"><h3 data-ar="تم" data-en="Done">تم</h3><audio id="out" controls style="width:100%;margin:12px 0"></audio><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'equalized.wav')"><i class="fas fa-download"></i></button></div>
</div>
<script>
let file=null;
setupDropZone(document.getElementById('uz'),document.getElementById('fi'),f=>{file=f;document.getElementById('preview').src=URL.createObjectURL(f);document.getElementById('controls').style.display='block';});
const EQ_PRESETS={flat:[0,0,0,0,0,0],bass:[8,5,2,0,0,0],vocal:[-2,-2,3,4,3,-1],treble:[0,0,0,3,5,8]};
function eqPreset(name){const vals=EQ_PRESETS[name];['60','250','1k','4k','8k','16k'].forEach((f,i)=>{document.getElementById('eq-'+f).value=vals[i];document.getElementById('eq-'+f+'-v').textContent=vals[i];});toast(lang==='ar'?'تم تطبيق الإعداد':'Preset applied','info');}
async function applyEq(){if(!file)return;const freqs=[60,250,1000,4000,8000,16000];const gains=['60','250','1k','4k','8k','16k'].map(f=>parseFloat(document.getElementById('eq-'+f).value));try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const ab=await file.arrayBuffer();const d=await ctx.decodeAudioData(ab);const offCtx=new OfflineAudioContext(d.numberOfChannels,d.length,d.sampleRate);const src=offCtx.createBufferSource();src.buffer=d;let chain=src;freqs.forEach((freq,i)=>{if(gains[i]!==0){const filter=offCtx.createBiquadFilter();filter.type='peaking';filter.frequency.value=freq;filter.gain.value=gains[i];filter.Q.value=1;chain.connect(filter);chain=filter;}});chain.connect(offCtx.destination);src.start();const rendered=await offCtx.startRendering();const wav=audioBufferToWav(rendered);const blob=new Blob([wav],{type:'audio/wav'});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم!':'Done!','success');}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
<div class="adsense-banner" style="height:250px;margin:32px 0"><div class="adsense-inner" style="flex-direction:column"><i class="fas fa-rectangle-ad" style="font-size:28px;opacity:0.2"></i><span style="margin-top:8px" data-ar="إعلان" data-en="Ad Space">إعلان</span></div></div>
</div>
<footer><div class="footer-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>

<p class="footer-copy" id="footer-copy">© 2025 عرب تولز — جميع الحقوق محفوظة</p>
</div></footer>

</body></html>
