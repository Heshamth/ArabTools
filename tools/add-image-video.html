<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Image to Video | ArabTools</title>
<meta name="description" content="إضافة صورة لفيديو - Add Image to Video | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#8b5cf622;color:#8b5cf6"><i class="fas fa-image"></i></div>
<div class="tool-page-info"><h1><span data-ar="إضافة صورة لفيديو" data-en="Add Image to Video">إضافة صورة لفيديو</span></h1><p><span data-ar="أضف صورة على الفيديو" data-en="Overlay image on video">أضف صورة على الفيديو</span></p></div>
</div>
<div class="tool-workspace">
<div class="form-group"><label class="form-label" data-ar="1. ارفع الفيديو:" data-en="1. Upload Video:">1. ارفع الفيديو:</label><div class="upload-zone" id="uz-aiv"><input type="file" id="fi-aiv" accept=".mp4,.webm,.mov"><i class="fas fa-cloud-upload-alt"></i><h3 data-ar="ارفع الفيديو" data-en="Upload File">ارفع الفيديو</h3><p>.mp4,.webm,.mov</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-aiv').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div></div>
<div class="form-group" id="img-wrap" style="display:none"><label class="form-label" data-ar="2. ارفع الصورة:" data-en="2. Upload Image:">2. ارفع الصورة:</label><div class="upload-zone" id="uz-aii"><input type="file" id="fi-aii" accept=".jpg,.jpeg,.png,.webp"><i class="fas fa-cloud-upload-alt"></i><h3 data-ar="ارفع الصورة" data-en="Upload File">ارفع الصورة</h3><p>.jpg,.jpeg,.png,.webp</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-aii').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div></div>
<div id="ctrl" style="display:none;margin-top:16px">
<div class="row"><div class="col form-group"><label class="form-label">X (%)</label><input type="number" class="form-control" id="ix" value="5" min="0" max="90"></div><div class="col form-group"><label class="form-label">Y (%)</label><input type="number" class="form-control" id="iy" value="5" min="0" max="90"></div><div class="col form-group"><label class="form-label" data-ar="حجم (%)" data-en="Size (%)">حجم</label><input type="number" class="form-control" id="is" value="15" min="5" max="50"></div></div>
<button class="btn btn-primary btn-lg" onclick="doOverlay()"><i class="fas fa-check"></i> <span data-ar="تطبيق وحفظ" data-en="Apply & Save">تطبيق وحفظ</span></button></div>
<div id="result" style="display:none" class="result-box"><h3 data-ar="تم!" data-en="Done!">تم!</h3><video id="out" controls style="width:100%;margin:12px 0;border-radius:8px"></video><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'with-image.webm')"><i class="fas fa-download"></i></button></div>
<script>
let vFile=null,imgEl=null;
setupDropZone(document.getElementById('uz-aiv'),document.getElementById('fi-aiv'),f=>{vFile=f;document.getElementById('img-wrap').style.display='block';});
setupDropZone(document.getElementById('uz-aii'),document.getElementById('fi-aii'),f=>{imgEl=new Image();imgEl.src=URL.createObjectURL(f);document.getElementById('ctrl').style.display='block';});
async function doOverlay(){if(!vFile||!imgEl)return;const xp=parseFloat(document.getElementById('ix').value)/100;const yp=parseFloat(document.getElementById('iy').value)/100;const sp=parseFloat(document.getElementById('is').value)/100;try{const blob=await processVideoWithCanvas(vFile,(ctx,video,canvas)=>{ctx.drawImage(video,0,0,canvas.width,canvas.height);const iw=canvas.width*sp;const ih=iw*(imgEl.naturalHeight/imgEl.naturalWidth);ctx.drawImage(imgEl,canvas.width*xp,canvas.height*yp,iw,ih);});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم!':'Done!','success');}catch(e){toast('Error','error');}}
</script></div>
</div>
<footer><div class="footer-inner">

</div></footer>

</body></html>
