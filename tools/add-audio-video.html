<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Add Audio to Video | ArabTools</title>
<meta name="description" content="إضافة صوت لفيديو - Add Audio to Video | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#8b5cf622;color:#8b5cf6"><i class="fas fa-volume-up"></i></div>
<div class="tool-page-info"><h1><span data-ar="إضافة صوت لفيديو" data-en="Add Audio to Video">إضافة صوت لفيديو</span></h1><p><span data-ar="أضف مقطع صوتي للفيديو" data-en="Add audio track to video">أضف مقطع صوتي للفيديو</span></p></div>
</div>
<div class="tool-workspace">
<div class="form-group"><label class="form-label" data-ar="1. ارفع الفيديو:" data-en="1. Upload Video:">1. ارفع الفيديو:</label><div class="upload-zone" id="uz-aav"><input type="file" id="fi-aav" accept=".mp4,.webm,.mov"><i class="fas fa-cloud-upload-alt"></i><h3 data-ar="ارفع الفيديو" data-en="Upload File">ارفع الفيديو</h3><p>.mp4,.webm,.mov</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-aav').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div></div>
<div class="form-group" id="aud-wrap" style="display:none"><label class="form-label" data-ar="2. ارفع الصوت:" data-en="2. Upload Audio:">2. ارفع الصوت:</label><div class="upload-zone" id="uz-aaa"><input type="file" id="fi-aaa" accept=".mp3,.wav,.ogg"><i class="fas fa-cloud-upload-alt"></i><h3 data-ar="ارفع الصوت" data-en="Upload File">ارفع الصوت</h3><p>.mp3,.wav,.ogg</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-aaa').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div></div>
<div id="preview-wrap" style="display:none;margin-top:16px"><video id="pv" controls style="width:100%;border-radius:8px;margin-bottom:12px"></video><audio id="ap" controls style="width:100%"></audio>
<button class="btn btn-primary btn-lg" style="margin-top:16px" onclick="doMerge()"><i class="fas fa-check"></i> <span data-ar="دمج وحفظ" data-en="Merge & Save">دمج وحفظ</span></button></div>
<div id="result" style="display:none" class="result-box"><h3 data-ar="تم!" data-en="Done!">تم!</h3><video id="out" controls style="width:100%;margin:12px 0;border-radius:8px"></video><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'with-audio.webm')"><i class="fas fa-download"></i></button></div>
<script>
let vFile=null,aFile=null;
setupDropZone(document.getElementById('uz-aav'),document.getElementById('fi-aav'),f=>{vFile=f;document.getElementById('pv').src=URL.createObjectURL(f);document.getElementById('aud-wrap').style.display='block';check();});
setupDropZone(document.getElementById('uz-aaa'),document.getElementById('fi-aaa'),f=>{aFile=f;document.getElementById('ap').src=URL.createObjectURL(f);check();});
function check(){if(vFile&&aFile)document.getElementById('preview-wrap').style.display='block';}
async function doMerge(){if(!vFile||!aFile)return;toast(lang==='ar'?'جاري الدمج...':'Merging...','info');try{const video=document.createElement('video');video.src=URL.createObjectURL(vFile);video.muted=true;await new Promise(r=>{video.onloadedmetadata=r;});const audio=document.createElement('audio');audio.src=URL.createObjectURL(aFile);await new Promise(r=>{audio.onloadedmetadata=r;});const canvas=document.createElement('canvas');canvas.width=video.videoWidth;canvas.height=video.videoHeight;const ctx=canvas.getContext('2d');const canvasStream=canvas.captureStream(30);const audioCtx=new AudioContext();const audioSrc=audioCtx.createMediaElementSource(audio);const dest=audioCtx.createMediaStreamDestination();audioSrc.connect(dest);audioSrc.connect(audioCtx.destination);dest.stream.getAudioTracks().forEach(t=>canvasStream.addTrack(t));const chunks=[];const rec=new MediaRecorder(canvasStream,{mimeType:'video/webm'});rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};rec.onstop=()=>{const blob=new Blob(chunks,{type:'video/webm'});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم!':'Done!','success');};rec.start();video.play();audio.play();function draw(){if(video.ended){rec.stop();audio.pause();return;}ctx.drawImage(video,0,0,canvas.width,canvas.height);requestAnimationFrame(draw);}draw();}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
</div>

</body></html>
