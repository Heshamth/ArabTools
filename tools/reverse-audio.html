</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#0ea5e922;color:#0ea5e9"><i class="fas fa-backward"></i></div>
<div class="tool-page-info"><h1><span data-ar="عكس الصوت" data-en="Reverse Audio">عكس الصوت</span></h1><p><span data-ar="اعكس تشغيل الصوت" data-en="Reverse audio playback">اعكس تشغيل الصوت</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz"><input type="file" id="fi" accept=".mp3,.wav,.ogg,.m4a,.webm"><i class="fas fa-cloud-upload-alt"></i>
<h3 data-ar="ارفع الملف الصوتي" data-en="Upload Audio">ارفع الملف الصوتي</h3><p>MP3, WAV, OGG</p>
<button class="btn btn-primary btn-sm" onclick="document.getElementById('fi').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="controls" style="display:none;margin-top:24px">
<div class="media-preview"><audio id="preview" controls style="width:100%;padding:12px"></audio></div>
<button class="btn btn-primary btn-lg" style="margin-top:16px" onclick="doReverse()"><i class="fas fa-backward"></i> <span data-ar="عكس الصوت" data-en="Reverse Audio">عكس الصوت</span></button>
<div id="result" style="display:none;margin-top:20px" class="result-box"><h3 data-ar="تم العكس" data-en="Reversed">تم العكس</h3><audio id="out" controls style="width:100%;margin:12px 0"></audio><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'reversed.wav')"><i class="fas fa-download"></i> <span data-ar="تنزيل" data-en="Download">تنزيل</span></button></div>
</div>
<script>
let file=null;
setupDropZone(document.getElementById('uz'),document.getElementById('fi'),f=>{file=f;document.getElementById('preview').src=URL.createObjectURL(f);document.getElementById('controls').style.display='block';});
async function doReverse(){if(!file)return;try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const ab=await file.arrayBuffer();const d=await ctx.decodeAudioData(ab);for(let c=0;c<d.numberOfChannels;c++){Array.prototype.reverse.call(d.getChannelData(c));}const wav=audioBufferToWav(d);const blob=new Blob([wav],{type:'audio/wav'});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم!':'Done!','success');}catch(e){toast('Error','error');}}
</script></div>
<div class="adsense-banner" style="height:250px;margin:32px 0"><div class="adsense-inner" style="flex-direction:column"><i class="fas fa-rectangle-ad" style="font-size:28px;opacity:0.2"></i><span style="margin-top:8px" data-ar="إعلان" data-en="Ad Space">إعلان</span></div></div>
</div>
