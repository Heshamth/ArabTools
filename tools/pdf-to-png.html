<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PDF to PNG | ArabTools</title>
<meta name="description" content="PDF إلى PNG - PDF to PNG | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#ef444422;color:#ef4444"><i class="fas fa-image"></i></div>
<div class="tool-page-info"><h1><span data-ar="PDF إلى PNG" data-en="PDF to PNG">PDF إلى PNG</span></h1><p><span data-ar="حوّل PDF إلى PNG" data-en="Convert PDF to PNG">حوّل PDF إلى PNG</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz-p2p"><input type="file" id="fi-p2p" accept=".pdf"><i class="fas fa-cloud-upload-alt"></i><h3>ارفع ملف PDF</h3><p>.pdf</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-p2p').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="ctrl" style="display:none;margin-top:24px">
<div class="form-group"><label class="form-label" data-ar="الدقة:" data-en="Resolution:">الدقة:</label><select class="form-control" id="scale"><option value="1">72 DPI</option><option value="2" selected>144 DPI</option><option value="3">216 DPI</option></select></div>
<button class="btn btn-primary btn-lg" onclick="doConvert()"><i class="fas fa-image"></i> <span data-ar="تحويل" data-en="Convert">تحويل</span></button>
<div id="pages" class="pdf-page-list" style="display:none;margin-top:20px"></div>
</div>
<script>
let file=null;
setupDropZone(document.getElementById('uz-p2p'),document.getElementById('fi-p2p'),f=>{file=f;document.getElementById('ctrl').style.display='block';});
async function doConvert(){if(!file)return;const scale=parseFloat(document.getElementById('scale').value)||2;const ab=await file.arrayBuffer();const pdf=await pdfjsLib.getDocument({data:ab}).promise;const container=document.getElementById('pages');container.style.display='grid';container.innerHTML='';for(let i=1;i<=pdf.numPages;i++){const page=await pdf.getPage(i);const vp=page.getViewport({scale});const canvas=document.createElement('canvas');canvas.width=vp.width;canvas.height=vp.height;await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;canvas.toBlob(blob=>{const div=document.createElement('div');div.className='pdf-page-thumb';const img=document.createElement('img');img.src=URL.createObjectURL(blob);div.appendChild(img);div.innerHTML+='<div style="font-size:12px;margin:6px 0">'+(lang==='ar'?'صفحة ':'Page ')+i+'</div>';const btn=document.createElement('button');btn.className='btn btn-primary btn-sm';btn.style.width='100%';btn.innerHTML='<i class="fas fa-download"></i>';btn.onclick=()=>download(blob,'page-'+i+'.png');div.appendChild(btn);container.appendChild(div);},'image/png');}toast(lang==='ar'?'تم التحويل!':'Converted!','success');}
</script></div>
</div>
<footer><div class="footer-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<p class="footer-copy" id="footer-copy">© 2025 عرب تولز — جميع الحقوق محفوظة</p>
</div></footer>
<script src="../js/shared.js"></script>
</body></html>
