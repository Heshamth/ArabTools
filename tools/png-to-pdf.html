<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PNG to PDF | ArabTools</title>
<meta name="description" content="PNG إلى PDF - PNG to PDF | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#ef444422;color:#ef4444"><i class="fas fa-file-pdf"></i></div>
<div class="tool-page-info"><h1><span data-ar="PNG إلى PDF" data-en="PNG to PDF">PNG إلى PDF</span></h1><p><span data-ar="حوّل صور PNG إلى PDF" data-en="Convert PNG to PDF">حوّل صور PNG إلى PDF</span></p></div>
</div>
<div class="tool-workspace">
<div id="files-list" style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px"></div>
<button class="btn btn-secondary" onclick="document.getElementById('fi').click()"><i class="fas fa-plus"></i> <span data-ar="إضافة صور" data-en="Add Images">إضافة صور</span></button>
<input type="file" id="fi" accept=".png,.jpeg" style="display:none" onchange="addImg(this)" multiple>
<div id="conv-wrap" style="display:none;margin-top:20px"><button class="btn btn-primary btn-lg" onclick="doConvert()"><i class="fas fa-file-pdf"></i> <span data-ar="تحويل إلى PDF" data-en="Convert to PDF">تحويل إلى PDF</span></button></div>
<script>
let imgs=[];
function addImg(input){Array.from(input.files).forEach(f=>{imgs.push(f);const list=document.getElementById('files-list');const item=document.createElement('div');item.style.cssText='display:flex;align-items:center;gap:10px;background:var(--surface2);padding:10px 14px;border-radius:8px;border:1px solid var(--border)';item.innerHTML='<i class="fas fa-image" style="color:var(--cat-pdf)"></i><span style="flex:1;font-size:14px">'+f.name+'</span>';list.appendChild(item);});document.getElementById('conv-wrap').style.display='block';input.value='';}
async function doConvert(){if(!imgs.length)return;try{const pdf=await PDFLib.PDFDocument.create();for(const f of imgs){const ab=await f.arrayBuffer();let img;if(f.name.toLowerCase().endsWith('.png')){img=await pdf.embedPng(ab);}else{img=await pdf.embedJpg(ab);}const page=pdf.addPage([img.width,img.height]);page.drawImage(img,{x:0,y:0,width:img.width,height:img.height});}const bytes=await pdf.save();download(new Blob([bytes],{type:'application/pdf'}),'images.pdf');toast(lang==='ar'?'تم!':'Done!','success');}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
</div>
<footer><div class="footer-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<p class="footer-copy" id="footer-copy">© 2025 عرب تولز — جميع الحقوق محفوظة</p>
</div></footer>
<script src="../js/shared.js"></script>
</body></html>
