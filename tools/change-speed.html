<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Change Speed | ArabTools</title>
<meta name="description" content="تغيير السرعة - Change Speed | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#0ea5e922;color:#0ea5e9"><i class="fas fa-forward"></i></div>
<div class="tool-page-info"><h1><span data-ar="تغيير السرعة" data-en="Change Speed">تغيير السرعة</span></h1><p><span data-ar="سرّع أو بطّئ الصوت" data-en="Speed or slow audio">سرّع أو بطّئ الصوت</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz"><input type="file" id="fi" accept=".mp3,.wav,.ogg,.webm"><i class="fas fa-cloud-upload-alt"></i>
<h3 data-ar="ارفع الملف الصوتي" data-en="Upload Audio">ارفع الملف الصوتي</h3><p>MP3, WAV, OGG</p>
<button class="btn btn-primary btn-sm" onclick="document.getElementById('fi').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="controls" style="display:none;margin-top:24px">
<div class="media-preview"><audio id="preview" controls style="width:100%;padding:12px"></audio></div>
<div class="form-group" style="margin-top:20px"><label class="form-label" data-ar="معدل السرعة:" data-en="Speed Rate:">معدل السرعة:</label><div class="range-wrap"><input type="range" class="form-control" id="rate" min="0.25" max="4" step="0.25" value="1" oninput="document.getElementById('rv').textContent=this.value+'x';document.getElementById('preview').playbackRate=this.value"><span id="rv">1x</span></div></div>
<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px"><button class="btn btn-secondary btn-sm" onclick="document.getElementById('rate').value=0.5;document.getElementById('rv').textContent='0.5x';document.getElementById('preview').playbackRate=0.5">0.5x</button><button class="btn btn-secondary btn-sm" onclick="document.getElementById('rate').value=0.75;document.getElementById('rv').textContent='0.75x';document.getElementById('preview').playbackRate=0.75">0.75x</button><button class="btn btn-secondary btn-sm" onclick="document.getElementById('rate').value=1;document.getElementById('rv').textContent='1x';document.getElementById('preview').playbackRate=1">1x</button><button class="btn btn-secondary btn-sm" onclick="document.getElementById('rate').value=1.5;document.getElementById('rv').textContent='1.5x';document.getElementById('preview').playbackRate=1.5">1.5x</button><button class="btn btn-secondary btn-sm" onclick="document.getElementById('rate').value=2;document.getElementById('rv').textContent='2x';document.getElementById('preview').playbackRate=2">2x</button><button class="btn btn-secondary btn-sm" onclick="document.getElementById('rate').value=3;document.getElementById('rv').textContent='3x';document.getElementById('preview').playbackRate=3">3x</button></div>
<button class="btn btn-primary" onclick="doSpeed()"><i class="fas fa-check"></i> <span data-ar="تطبيق وحفظ" data-en="Apply & Save">تطبيق وحفظ</span></button>
<div id="result" style="display:none;margin-top:20px" class="result-box"><h3 data-ar="تم" data-en="Done">تم</h3><audio id="out" controls style="width:100%;margin:12px 0"></audio><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'speed-adjusted.wav')"><i class="fas fa-download"></i></button></div>
</div>
<script>
let file=null;
setupDropZone(document.getElementById('uz'),document.getElementById('fi'),f=>{file=f;document.getElementById('preview').src=URL.createObjectURL(f);document.getElementById('controls').style.display='block';});
async function doSpeed(){if(!file)return;const rate=parseFloat(document.getElementById('rate').value)||1;try{const ctx=new OfflineAudioContext(2,1,44100);const ab=await file.arrayBuffer();const d=await ctx.decodeAudioData(ab);const newLen=Math.ceil(d.length/rate);const offCtx=new OfflineAudioContext(d.numberOfChannels,newLen,d.sampleRate);const src=offCtx.createBufferSource();src.buffer=d;src.playbackRate.value=rate;src.connect(offCtx.destination);src.start();const rendered=await offCtx.startRendering();const wav=audioBufferToWav(rendered);const blob=new Blob([wav],{type:'audio/wav'});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم!':'Done!','success');}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
<div class="adsense-banner" style="height:250px;margin:32px 0"><div class="adsense-inner" style="flex-direction:column"><i class="fas fa-rectangle-ad" style="font-size:28px;opacity:0.2"></i><span style="margin-top:8px" data-ar="إعلان" data-en="Ad Space">إعلان</span></div></div>
</div>

</div></footer>

</body></html>
