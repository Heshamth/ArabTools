<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Archive Extractor | ArabTools</title>
<meta name="description" content="فك الضغط - Archive Extractor | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#f59e0b22;color:#f59e0b"><i class="fas fa-box-open"></i></div>
<div class="tool-page-info"><h1><span data-ar="فك الضغط" data-en="Archive Extractor">فك الضغط</span></h1><p><span data-ar="فك ضغط الملفات" data-en="Extract compressed files">فك ضغط الملفات</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz-ae"><input type="file" id="fi-ae" accept=".zip"><i class="fas fa-cloud-upload-alt"></i><h3>ارفع ملف ZIP</h3><p>.zip</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-ae').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="list" style="display:none;margin-top:24px"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
let file=null;
setupDropZone(document.getElementById('uz-ae'),document.getElementById('fi-ae'),f=>{file=f;if(!f.name.endsWith('.zip')){toast(lang==='ar'?'يدعم ZIP حالياً':'ZIP only currently','info');return;}doExtract();});
async function doExtract(){if(!file)return;try{const ab=await file.arrayBuffer();const zip=await JSZip.loadAsync(ab);const list=document.getElementById('list');list.style.display='block';list.innerHTML='<h3 style="margin-bottom:12px">'+(lang==='ar'?'محتويات الملف:':'Archive contents:')+'</h3>';const items=[];zip.forEach((path,f)=>{if(!f.dir)items.push({path,f});});list.innerHTML+=items.map(({path})=>'<div style="padding:8px;background:var(--surface2);border-radius:6px;margin-bottom:6px;font-size:13px;color:var(--text-muted)"><i class="fas fa-file" style="margin-inline-end:8px"></i>'+path+'</div>').join('');items.forEach(({path,f})=>{f.async('blob').then(blob=>{const btn=document.createElement('button');btn.className='btn btn-primary btn-sm';btn.style.marginBottom='8px';btn.innerHTML='<i class="fas fa-download"></i> '+path.split('/').pop();btn.onclick=()=>download(blob,path.split('/').pop());list.appendChild(btn);});});toast(lang==='ar'?'تم فك الضغط!':'Extracted!','success');}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
</div>
<footer><div class="footer-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<p class="footer-copy" id="footer-copy">© 2025 عرب تولز — جميع الحقوق محفوظة</p>
</div></footer>
<script src="../js/shared.js"></script>
</body></html>
