<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">

<meta name="description" content="قص صوت - Trim Audio | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">

</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#0ea5e922;color:#0ea5e9"><i class="fas fa-cut"></i></div>
<div class="tool-page-info"><h1><span data-ar="قص صوت" data-en="Trim Audio">قص صوت</span></h1><p><span data-ar="اقتص مقطع صوتي" data-en="Cut audio segment">اقتص مقطع صوتي</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz"><input type="file" id="fi" accept=".mp3,.wav,.ogg,.m4a,.aac,.webm"><i class="fas fa-cloud-upload-alt"></i>
<h3 data-ar="ارفع الملف الصوتي" data-en="Upload Audio File">ارفع الملف الصوتي</h3><p>MP3, WAV, OGG, M4A</p>
<button class="btn btn-primary btn-sm" onclick="document.getElementById('fi').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="controls" style="display:none;margin-top:24px">
<div class="media-preview"><audio id="preview" controls style="width:100%;padding:12px"></audio></div>
<div class="row" style="margin-top:20px">
<div class="col form-group"><label class="form-label" data-ar="وقت البداية (ثانية):" data-en="Start (sec):">وقت البداية:</label><input type="number" class="form-control" id="start" value="0" min="0" step="0.1"></div>
<div class="col form-group"><label class="form-label" data-ar="وقت النهاية (ثانية):" data-en="End (sec):">وقت النهاية:</label><input type="number" class="form-control" id="end" value="10" min="0" step="0.1"></div>
</div>
<button class="btn btn-primary btn-lg" onclick="doTrim()"><i class="fas fa-cut"></i> <span data-ar="قص الصوت" data-en="Trim Audio">قص الصوت</span></button>
<div id="result" style="display:none;margin-top:20px" class="result-box"><h3 data-ar="تم القص" data-en="Trimmed">تم القص</h3><audio id="out" controls style="width:100%;margin:12px 0"></audio><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'trimmed.wav')"><i class="fas fa-download"></i> <span data-ar="تنزيل" data-en="Download">تنزيل</span></button></div>
</div>
<script>
let file=null;
setupDropZone(document.getElementById('uz'),document.getElementById('fi'),f=>{file=f;const u=URL.createObjectURL(f);const a=document.getElementById('preview');a.src=u;document.getElementById('controls').style.display='block';a.onloadedmetadata=()=>{document.getElementById('end').value=a.duration.toFixed(1);};});
async function doTrim(){if(!file)return;const s=parseFloat(document.getElementById('start').value)||0;const e=parseFloat(document.getElementById('end').value)||10;try{const ctx=new(window.AudioContext||window.webkitAudioContext)();const ab=await file.arrayBuffer();const d=await ctx.decodeAudioData(ab);const sr=d.sampleRate;const ss=Math.floor(s*sr);const se=Math.min(Math.floor(e*sr),d.length);const len=se-ss;const nb=ctx.createBuffer(d.numberOfChannels,len,sr);for(let c=0;c<d.numberOfChannels;c++){nb.copyToChannel(d.getChannelData(c).slice(ss,se),c);}const wav=audioBufferToWav(nb);const blob=new Blob([wav],{type:'audio/wav'});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم القص!':'Trimmed!','success');}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
<div class="adsense-banner" style="height:250px;margin:32px 0"><div class="adsense-inner" style="flex-direction:column"><i class="fas fa-rectangle-ad" style="font-size:28px;opacity:0.2"></i><span style="margin-top:8px" data-ar="إعلان" data-en="Ad Space">إعلان</span></div></div>
</div>

</div></footer>

</body></html>
