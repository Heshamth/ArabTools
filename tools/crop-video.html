<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Crop Video | ArabTools</title>
<meta name="description" content="اقتصاص فيديو - Crop Video | ArabTools">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header id="site-header"><div class="header-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<nav class="main-nav"><a class="nav-link" href="../index.html" data-ar="الرئيسية" data-en="Home">الرئيسية</a><a class="nav-link" href="../pages/help.html" data-ar="مساعدة" data-en="Help">مساعدة</a></nav>
<button class="lang-toggle" onclick="toggleLang()"><i class="fas fa-globe globe"></i><span id="lang-label">EN</span></button>
</div></header>
<div id="toast-container"></div>
<div class="tool-page-wrap">
<div class="adsense-banner inline" style="margin-bottom:24px"><div class="adsense-inner"><i class="fas fa-rectangle-ad" style="opacity:0.2"></i> <span data-ar="مساحة إعلانية" data-en="Ad Space">مساحة إعلانية</span></div></div>
<div class="tool-page-header">
<a class="back-btn" href="../index.html"><i class="fas fa-arrow-left"></i> <span data-ar="رجوع" data-en="Back">رجوع</span></a>
<div class="tool-page-icon" style="background:#8b5cf622;color:#8b5cf6"><i class="fas fa-crop-alt"></i></div>
<div class="tool-page-info"><h1><span data-ar="اقتصاص فيديو" data-en="Crop Video">اقتصاص فيديو</span></h1><p><span data-ar="اقتصص الفيديو" data-en="Crop video frame">اقتصص الفيديو</span></p></div>
</div>
<div class="tool-workspace">
<div class="upload-zone" id="uz-crv"><input type="file" id="fi-crv" accept=".mp4,.webm,.mov"><i class="fas fa-cloud-upload-alt"></i><h3 data-ar="ارفع الفيديو" data-en="Upload File">ارفع الفيديو</h3><p>.mp4,.webm,.mov</p><button class="btn btn-primary btn-sm" onclick="document.getElementById('fi-crv').click()"><i class="fas fa-folder-open"></i> <span data-ar="اختر ملفاً" data-en="Choose File">اختر ملفاً</span></button></div>
<div id="ctrl" style="display:none;margin-top:24px">
<div class="media-preview"><video id="pv" controls></video></div>
<div class="row" style="margin-top:16px">
<div class="col form-group"><label class="form-label">X (%)</label><input type="number" class="form-control" id="cx" value="10" min="0" max="90"></div>
<div class="col form-group"><label class="form-label">Y (%)</label><input type="number" class="form-control" id="cy" value="10" min="0" max="90"></div>
<div class="col form-group"><label class="form-label" data-ar="عرض (%)" data-en="Width (%)">عرض</label><input type="number" class="form-control" id="cw" value="80" min="10" max="100"></div>
<div class="col form-group"><label class="form-label" data-ar="ارتفاع (%)" data-en="Height (%)">ارتفاع</label><input type="number" class="form-control" id="ch" value="80" min="10" max="100"></div>
</div>
<button class="btn btn-primary btn-lg" onclick="doCrop()"><i class="fas fa-crop-alt"></i> <span data-ar="اقتصاص وحفظ" data-en="Crop & Save">اقتصاص وحفظ</span></button>
<div id="result" style="display:none" class="result-box"><h3 data-ar="تم!" data-en="Done!">تم!</h3><video id="out" controls style="width:100%;margin:12px 0;border-radius:8px"></video><button class="btn btn-primary" onclick="if(window._blob)download(window._blob,'cropped.webm')"><i class="fas fa-download"></i></button></div>
</div>
<script>
let file=null;
setupDropZone(document.getElementById('uz-crv'),document.getElementById('fi-crv'),f=>{file=f;document.getElementById('pv').src=URL.createObjectURL(f);document.getElementById('ctrl').style.display='block';});
async function doCrop(){if(!file)return;const xp=parseFloat(document.getElementById('cx').value)/100;const yp=parseFloat(document.getElementById('cy').value)/100;const wp=parseFloat(document.getElementById('cw').value)/100;const hp=parseFloat(document.getElementById('ch').value)/100;try{const vid=document.createElement('video');vid.src=URL.createObjectURL(file);vid.muted=true;await new Promise(r=>{vid.onloadedmetadata=r;});const sw=Math.round(vid.videoWidth*wp);const sh=Math.round(vid.videoHeight*hp);const blob=await processVideoWithCanvas(file,(ctx,video,canvas)=>{const sx=video.videoWidth*xp;const sy=video.videoHeight*yp;const sw2=video.videoWidth*wp;const sh2=video.videoHeight*hp;ctx.drawImage(video,sx,sy,sw2,sh2,0,0,canvas.width,canvas.height);},{width:sw,height:sh});window._blob=blob;document.getElementById('out').src=URL.createObjectURL(blob);document.getElementById('result').style.display='block';toast(lang==='ar'?'تم!':'Done!','success');}catch(e){toast('Error: '+e.message,'error');}}
</script></div>
</div>
<footer><div class="footer-inner">
<a class="logo" href="../index.html"><div class="logo-icon">A</div><div class="logo-text"><span class="en">ArabTools</span><span class="ar">عرب تولز</span></div></a>
<p class="footer-copy" id="footer-copy">© 2025 عرب تولز — جميع الحقوق محفوظة</p>
</div></footer>
<script src="../js/shared.js"></script>
</body></html>
